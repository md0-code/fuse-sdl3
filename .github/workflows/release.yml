name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.2)'
        required: true

env:
  BUILD_TYPE: Release

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build pkg-config \
          libxml2-dev libpng-dev zlib1g-dev libbz2-dev \
          flex bison perl \
          libgl1-mesa-dev libx11-dev libxext-dev libxrandr-dev \
          libxcursor-dev libxi-dev libxss-dev \
          libasound2-dev libpulse-dev \
          libwayland-dev libxkbcommon-dev wayland-protocols \
          libdbus-1-dev libdrm-dev libgbm-dev libudev-dev

        cd /tmp
        git clone --depth 1 https://github.com/libsdl-org/SDL.git SDL3
        cd SDL3
        cmake -B build -DCMAKE_BUILD_TYPE=Release \
              -DSDL_SHARED=ON -DSDL_STATIC=OFF \
              -DSDL_TEST=OFF -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF
        cmake --build build --parallel $(nproc)
        sudo cmake --install build
        sudo ldconfig

    - name: Build
      run: |
        chmod +x scripts/build-linux.sh
        ./scripts/build-linux.sh --package

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fuse-sdl3-linux
        path: build-linux/fuse-sdl3-*-Linux-*.tar.gz
        retention-days: 90

  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build
      shell: pwsh
      run: ./scripts/build-win.ps1 -Package

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fuse-sdl3-windows
        path: build-win/fuse-sdl3-*-Windows-*.zip
        retention-days: 90

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Prepare release assets
      run: |
        mkdir -p release-assets
        find artifacts/ -name "*.tar.gz" -exec cp {} release-assets/ \;
        find artifacts/ -name "*.zip" -exec cp {} release-assets/ \;
        echo "=== Release assets ==="
        ls -la release-assets/

    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Extract changelog
      id: changelog
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        VER="${TAG#v}"
        if [ -f CHANGELOG.md ]; then
          NOTES=$(awk "/^## .*${VER}/ {found=1; next} /^## / {if(found) exit} found {print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES=$(awk '/^## / {if(++c==2) exit} c==1 && !/^## / {print}' CHANGELOG.md)
          fi
        fi
        echo "notes<<EOF" >> $GITHUB_OUTPUT
        echo "${NOTES:-Release ${TAG}}" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Fuse SDL3 ${{ steps.version.outputs.tag }}
        body: |
          ### Downloads
          - **Linux**: Download the `.tar.gz` archive, extract it, and run `./fuse`
          - **Windows**: Download the `.zip` archive, extract it, and run `fuse.exe`

          ### Changes
          ${{ steps.changelog.outputs.notes }}
        files: release-assets/*
        draft: false
        prerelease: false
