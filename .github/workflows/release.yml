name: Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. 0.2.0)'
        required: true

env:
  BUILD_TYPE: Release

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build pkg-config \
          libspectrum-dev libglib2.0-dev libgcrypt20-dev \
          libxml2-dev libpng-dev zlib1g-dev libbz2-dev \
          flex bison perl \
          libgl1-mesa-dev libx11-dev libxext-dev libxrandr-dev \
          libxcursor-dev libxi-dev libxss-dev libxtst-dev \
          libasound2-dev libpulse-dev \
          libwayland-dev libxkbcommon-dev wayland-protocols \
          libdecor-0-dev libdbus-1-dev libdrm-dev libgbm-dev libudev-dev

        cd /tmp
        git clone --depth 1 https://github.com/libsdl-org/SDL.git SDL3
        cd SDL3
        cmake -B build -DCMAKE_BUILD_TYPE=Release \
              -DSDL_SHARED=ON -DSDL_STATIC=OFF \
              -DSDL_TEST=OFF -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF
        cmake --build build --parallel $(nproc)
        sudo cmake --install build
        sudo ldconfig

    - name: Build main package
      run: |
        chmod +x scripts/build-linux.sh
        ./scripts/build-linux.sh --package

    - name: Build libretro package
      run: |
        chmod +x scripts/build-linux.sh
        ./scripts/build-linux.sh --libretro --package build-linux-libretro

    - name: Upload main Linux package
      uses: actions/upload-artifact@v4
      with:
        name: fuse-sdl3-linux
        path: build-linux/fuse-sdl3-*-Linux-*.tar.gz
        retention-days: 90

    - name: Upload libretro Linux package
      uses: actions/upload-artifact@v4
      with:
        name: fuse-sdl3-libretro-linux
        path: build-linux-libretro/fuse-sdl3_libretro-*.tar.gz
        retention-days: 90

  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install build tools
      run: choco install winflexbison3 -y

    - name: Build main package
      shell: pwsh
      run: ./scripts/build-win.ps1 -Package

    - name: Build libretro package
      shell: pwsh
      run: ./scripts/build-win.ps1 -Libretro -BuildDir build-win-libretro-standalone -Package

    - name: Upload main Windows package
      uses: actions/upload-artifact@v4
      with:
        name: fuse-sdl3-windows
        path: build-win/fuse-sdl3-*-Windows-*.zip
        retention-days: 90

    - name: Upload libretro Windows package
      uses: actions/upload-artifact@v4
      with:
        name: fuse-sdl3-libretro-windows
        path: build-win/fuse-sdl3_libretro-*.zip
        retention-days: 90

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download main Linux package
      uses: actions/download-artifact@v4
      with:
        name: fuse-sdl3-linux
        path: artifacts/fuse-sdl3-linux

    - name: Download libretro Linux package
      uses: actions/download-artifact@v4
      with:
        name: fuse-sdl3-libretro-linux
        path: artifacts/fuse-sdl3-libretro-linux

    - name: Download main Windows package
      uses: actions/download-artifact@v4
      with:
        name: fuse-sdl3-windows
        path: artifacts/fuse-sdl3-windows

    - name: Download libretro Windows package
      uses: actions/download-artifact@v4
      with:
        name: fuse-sdl3-libretro-windows
        path: artifacts/fuse-sdl3-libretro-windows

    - name: Prepare release assets
      run: |
        mkdir -p release-assets
        find artifacts/ -name "*.tar.gz" -exec cp {} release-assets/ \;
        find artifacts/ -name "*.zip" -exec cp {} release-assets/ \;
        echo "=== Release assets ==="
        ls -la release-assets/

    - name: Determine tag
      id: tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Extract changelog
      run: |
        python3 scripts/extract_release_notes.py CHANGELOG.md "${{ steps.tag.outputs.tag }}" release-notes.md

    - name: Create or update release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        tag="${{ steps.tag.outputs.tag }}"

        if gh release view "$tag" >/dev/null 2>&1; then
          gh release edit "$tag" --title "$tag" --notes-file release-notes.md
        else
          gh release create "$tag" --title "$tag" --notes-file release-notes.md
        fi

        gh release upload "$tag" release-assets/* --clobber
