name: Release Libretro Packages

on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release Notes
    runs-on: ubuntu-24.04

    outputs:
      tag: ${{ steps.version.outputs.raw }}
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          echo "raw=$tag" >> "$GITHUB_OUTPUT"
          tag="${tag#v}"
          project_version="$(tr -d '\r' < CMakeLists.txt | sed -n 's/^project(fuse VERSION \([^ ]*\) LANGUAGES C)$/\1/p')"

          if [ -z "$project_version" ]; then
            echo "Failed to resolve project version from CMakeLists.txt" >&2
            exit 1
          fi

          if [ "$tag" != "$project_version" ]; then
            echo "Tag version '$tag' does not match project version '$project_version'" >&2
            exit 1
          fi

          echo "value=$tag" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        shell: bash
        run: |
          python3 scripts/extract_release_notes.py CHANGELOG.md "${{ steps.version.outputs.raw }}" release-notes.md

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  build-linux:
    name: Build Linux Libretro Package
    runs-on: ubuntu-24.04
    needs: prepare

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Linux build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libspectrum-dev libglib2.0-dev libgcrypt20-dev \
            libxml2-dev libpng-dev zlib1g-dev libbz2-dev \
            flex bison perl \
            libgl1-mesa-dev libx11-dev libxext-dev libxrandr-dev \
            libxcursor-dev libxi-dev libxss-dev libxtst-dev \
            libasound2-dev libpulse-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            libdecor-0-dev libdbus-1-dev libdrm-dev libgbm-dev libudev-dev

          cd /tmp
          git clone --depth 1 https://github.com/libsdl-org/SDL.git SDL3
          cd SDL3
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DSDL_SHARED=ON -DSDL_STATIC=OFF \
                -DSDL_TEST=OFF -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF
          cmake --build build --parallel $(nproc)
          sudo cmake --install build
          sudo ldconfig

      - name: Build Linux libretro package
        shell: bash
        run: |
          sh ./scripts/build-linux.sh --libretro --package build-linux-libretro

      - name: Upload Linux libretro artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-libretro-package
          path: build-linux-libretro/fuse-sdl3_libretro-*.tar.gz
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  build-windows:
    name: Build Windows Libretro Package
    runs-on: windows-latest
    needs: prepare

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Windows build tools
        shell: pwsh
        run: |
          choco install winflexbison3 -y

      - name: Build Windows libretro package
        shell: pwsh
        run: |
          ./scripts/build-win.ps1 -Libretro -BuildDir build-win-libretro-standalone -Package

      - name: Upload Windows libretro artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-libretro-package
          path: build-win/fuse-sdl3_libretro-*.zip
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - prepare
      - build-linux
      - build-windows
    permissions:
      contents: write

    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: dist

      - name: Download Linux package
        uses: actions/download-artifact@v4
        with:
          name: linux-libretro-package
          path: dist

      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: windows-libretro-package
          path: dist

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ needs.prepare.outputs.tag }}"

          notes_file="dist/release-notes.md"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes-file "$notes_file"
          else
            gh release create "$tag" --title "$tag" --notes-file "$notes_file"
          fi

          gh release upload "$tag" dist/*.tar.gz dist/*.zip --clobber