name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build pkg-config \
          libspectrum-dev libglib2.0-dev libgcrypt20-dev \
          libxml2-dev libpng-dev zlib1g-dev libbz2-dev \
          flex bison perl \
          libgl1-mesa-dev libx11-dev libxext-dev libxrandr-dev \
          libxcursor-dev libxi-dev libxss-dev libxtst-dev \
          libasound2-dev libpulse-dev \
          libwayland-dev libxkbcommon-dev wayland-protocols \
          libdbus-1-dev libdrm-dev libgbm-dev libudev-dev

        # Build SDL3 from source (not packaged in Ubuntu 24.04)
        cd /tmp
        git clone --depth 1 https://github.com/libsdl-org/SDL.git SDL3
        cd SDL3
        cmake -B build -DCMAKE_BUILD_TYPE=Release \
              -DSDL_SHARED=ON -DSDL_STATIC=OFF \
              -DSDL_TEST=OFF -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF
        cmake --build build --parallel $(nproc)
        sudo cmake --install build
        sudo ldconfig

    - name: Build
      run: |
        chmod +x scripts/build-linux.sh
        ./scripts/build-linux.sh --package

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fuse-sdl3-linux
        path: build-linux/fuse-sdl3-*-Linux-*.tar.gz
        retention-days: 7

  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install build tools
      run: choco install winflexbison3 -y

    - name: Build
      shell: pwsh
      run: ./scripts/build-win.ps1 -Package

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fuse-sdl3-windows
        path: build-win/fuse-sdl3-*-Windows-*.zip
        retention-days: 7
